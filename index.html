<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EvilBS Builder - Bootstrap Page Builder</title>
  <link rel="stylesheet" href="assets/bootstrap/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/bootstrap-icons/bootstrap-icons.css">
  <link rel="stylesheet" href="assets/css/builder.css">
</head>
<body>

  <!-- Top Toolbar -->
  <header id="toolbar">
    <div class="toolbar-brand">
      <i class="bi bi-grid-1x2-fill"></i>
      <span>EvilBS Builder</span>
    </div>
    <div class="toolbar-actions">
      <!-- Sidebar toggles (always visible) -->
      <button id="btn-toggle-sidebar" class="tb-btn tb-toggle active" title="Componentes">
        <i class="bi bi-layout-sidebar"></i>
      </button>
      <button id="btn-toggle-props" class="tb-btn tb-toggle active" title="Propiedades">
        <i class="bi bi-layout-sidebar-reverse"></i>
      </button>
      <div class="tb-sep tb-hide-mobile"></div>
      <button id="btn-undo" class="tb-btn tb-hide-mobile" title="Deshacer (Ctrl+Z)" disabled>
        <i class="bi bi-arrow-counterclockwise"></i>
      </button>
      <button id="btn-redo" class="tb-btn tb-hide-mobile" title="Rehacer (Ctrl+Y)" disabled>
        <i class="bi bi-arrow-clockwise"></i>
      </button>
      <div class="tb-sep tb-hide-mobile"></div>
      <div class="vp-group tb-hide-mobile" id="vp-group">
        <button class="tb-btn active" data-vp="desktop" title="Desktop (100%)">
          <i class="bi bi-laptop"></i>
        </button>
        <button class="tb-btn" data-vp="tablet" title="Tablet (768px)">
          <i class="bi bi-tablet"></i>
        </button>
        <button class="tb-btn" data-vp="mobile" title="Mobile (375px)">
          <i class="bi bi-phone"></i>
        </button>
      </div>
      <div class="tb-sep tb-hide-mobile"></div>
      <button id="btn-clear" class="tb-btn tb-hide-mobile" title="Limpiar canvas">
        <i class="bi bi-eraser"></i>
      </button>
      <button id="btn-preview" class="tb-btn tb-accent" title="Vista previa">
        <i class="bi bi-eye"></i> <span class="tb-label">Preview</span>
      </button>
      <button id="btn-export" class="tb-btn tb-success" title="Exportar HTML">
        <i class="bi bi-download"></i> <span class="tb-label">Export</span>
      </button>
    </div>
  </header>

  <!-- Mobile backdrop -->
  <div id="mobile-backdrop"></div>

  <!-- Main Three-Column Layout -->
  <div id="main">

    <!-- Left Sidebar: Components -->
    <aside id="sidebar">
      <div class="sidebar-search">
        <div class="search-wrap">
          <i class="bi bi-search"></i>
          <input type="search" id="comp-search" placeholder="Buscar...">
        </div>
      </div>
      <div id="sidebar-list">
        <!-- Generated by JS -->
      </div>
    </aside>

    <!-- Canvas Area -->
    <div id="canvas-area">
      <div id="canvas-bar">
        <div id="breadcrumb-path">
          <i class="bi bi-display"></i>
          <span id="canvas-label">canvas</span>
        </div>
        <div class="canvas-info">
          <span id="el-count" class="small text-muted">0 elementos</span>
        </div>
      </div>
      <div id="canvas-scroll">
        <div id="canvas-outer">
          <div id="canvas">
            <div id="canvas-empty">
              <div class="empty-icon"><i class="bi bi-grid-1x2"></i></div>
              <h5>Canvas vacío</h5>
              <p>Arrastra componentes desde el panel izquierdo<br>para comenzar a construir tu página</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Right Panel: Properties -->
    <aside id="props-panel">
      <div id="props-empty">
        <div class="empty-icon"><i class="bi bi-cursor"></i></div>
        <p>Selecciona un elemento<br>para editar sus propiedades</p>
      </div>
      <div id="props-content" class="hidden">
        <!-- Generated by JS -->
      </div>
    </aside>

  </div>

  <!-- Footer -->
  <footer id="builder-footer">
    <span>© 2026 <a href="https://evilnapsis.com/" target="_blank" rel="noopener">Evilnapsis</a> — Copyright</span>
  </footer>

  <!-- Floating Element Toolbar -->
  <div id="el-toolbar" class="hidden">
    <span id="el-type-badge"></span>
    <div class="el-tb-actions">
      <button id="el-move-up" title="Mover arriba"><i class="bi bi-arrow-up"></i></button>
      <button id="el-move-down" title="Mover abajo"><i class="bi bi-arrow-down"></i></button>
      <button id="el-parent" title="Seleccionar padre"><i class="bi bi-arrow-bar-up"></i></button>
      <button id="el-clone" title="Duplicar"><i class="bi bi-copy"></i></button>
      <button id="el-delete" title="Eliminar" class="el-delete-btn"><i class="bi bi-trash"></i></button>
    </div>
  </div>

  <!-- Preview Overlay -->
  <div id="preview-overlay" class="hidden">
    <div id="preview-modal">
      <div id="preview-header">
        <div class="preview-brand">
          <i class="bi bi-eye"></i> Vista Previa
        </div>
        <div class="vp-group" id="preview-vp-group">
          <button class="tb-btn active" data-pvp="100%" title="Desktop">
            <i class="bi bi-laptop"></i>
          </button>
          <button class="tb-btn" data-pvp="768px" title="Tablet">
            <i class="bi bi-tablet"></i>
          </button>
          <button class="tb-btn" data-pvp="375px" title="Mobile">
            <i class="bi bi-phone"></i>
          </button>
        </div>
        <button id="preview-close" class="tb-btn">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>
      <div id="preview-body">
        <iframe id="preview-frame" frameborder="0"></iframe>
      </div>
    </div>
  </div>

  <script src="assets/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/builder.js"></script>
</body>
</html>
